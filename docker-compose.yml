version: '3.9'

services:
  # ClickHouse - OLAP Database for large-scale analytics
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: soc_clickhouse
    environment:
      CLICKHOUSE_DB: soc_db
      CLICKHOUSE_USER: soc_user
      CLICKHOUSE_PASSWORD: soc_password_123
    ports:
      - "20001:8123"  # HTTP interface
      - "20002:9000"  # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - soc_network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch - Search and analytics engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: soc_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "20003:9200"  # REST API
      - "20004:9300"  # Node communication
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - soc_network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache for real-time data
  redis:
    image: redis:7-alpine
    container_name: soc_redis
    ports:
      - "20005:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - soc_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc_backend
    environment:
      PORT: 8080
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CLICKHOUSE_URL: clickhouse:9000
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: debug
      ENVIRONMENT: production
    ports:
      - "20006:8080"
    volumes:
      - ./backend:/app
    depends_on:
      elasticsearch:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soc_network

  # ML/AI Threat Detection Service (Python)
  threat_detection:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: soc_threat_detection
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CLICKHOUSE_URL: clickhouse:9000
      REDIS_URL: redis://redis:6379
      MODEL_TYPE: isolation_forest
      BATCH_SIZE: 1000
      UPDATE_INTERVAL: 300
    volumes:
      - ./ml_service:/app
      - ./models:/app/models
    depends_on:
      elasticsearch:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soc_network

  # React Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://backend:8080
    container_name: soc_frontend
    ports:
      - "5178:3000"
    environment:
      REACT_APP_API_URL: http://localhost:20006
      REACT_APP_ES_URL: http://localhost:20003
      REACT_APP_CLICKHOUSE_URL: http://localhost:20001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - soc_network

  # Kibana for Elasticsearch Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: soc_kibana
    ports:
      - "20007:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc_network

volumes:
  clickhouse_data:
  elasticsearch_data:
  redis_data:

networks:
  soc_network:
    driver: bridge
