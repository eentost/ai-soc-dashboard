version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: soc_postgres
    environment:
      POSTGRES_DB: soc_db
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: soc_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: soc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc_network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc_backend
    environment:
      DATABASE_URL: postgresql://soc_user:soc_password_123@postgres:5432/soc_db
      REDIS_URL: redis://redis:6379
      FLASK_ENV: production
      ML_MODEL_PATH: /app/models
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soc_network

  # ML/AI Threat Detection Service
  threat_detection:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: soc_threat_detection
    environment:
      DATABASE_URL: postgresql://soc_user:soc_password_123@postgres:5432/soc_db
      REDIS_URL: redis://redis:6379
      MODEL_TYPE: isolation_forest
    volumes:
      - ./ml_service:/app
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soc_network

  # Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soc_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - soc_network

  # Elasticsearch for Log Storage and Analysis
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: soc_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - soc_network

  # Kibana for Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.0.0
    container_name: soc_kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - soc_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  soc_network:
    driver: bridge
